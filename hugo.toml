baseURL = "https://blog-8lz.pages.dev/"
languageCode = "ja"
defaultContentLanguage = "ja"
title = "ググっても分からなかった初心者へ"
theme = "PaperMod"
paginate = 10

[params]
  env = "production"
  description = "プログラミングや技術でつまずいた初心者のための解決ノート"
  author = "ググっても分からなかった初心者へ"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  defaultTheme = "light"

  [params.profileMode]
    enabled = true
    title = "ググっても分からなかった初心者へ"
    subtitle = "検索しても解決しなかったあの問題、ここで一緒に解決します。"
    imageUrl = ""
    imageTitle = ""
    imageWidth = 120
    imageHeight = 120
    [[params.profileMode.buttons]]
      name = "📝 記事を読む"
      url = "/posts/"
    [[params.profileMode.buttons]]
      name = "🔍 検索する"
      url = "/search/"

  [params.homeInfoParams]
    Title = "ググっても分からなかった初心者へ"
    Content = "検索しても解決しなかったあの問題、ここで一緒に解決します。"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    codeFences = true
    lineNos = false
    style = "monokai"

[menu]
  [[menu.main]]
    identifier = "tags"
    name = "タグ"
    url = "/tags/"
    weight = 10
  [[menu.main]]
    identifier = "archives"
    name = "アーカイブ"
    url = "/archives/"
    weight = 20
  [[menu.main]]
    identifier = "search"
    name = "検索"
    url = "/search/"
    weight = 30
