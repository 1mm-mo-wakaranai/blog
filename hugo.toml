baseURL = "https://blog-8lz.pages.dev/"
languageCode = "ja"
defaultContentLanguage = "ja"
title = "ググっても分からなかった初心者へ"
theme = "PaperMod"
paginate = 10

[params]
  env = "production"
  description = "プログラミングや技術でつまずいた初心者のための解決ノート"
  author = "ググっても分からなかった初心者へ"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  defaultTheme = "light"

  [params.homeInfoParams]
    Title = "ググっても分からなかった初心者へ"
    Content = "検索しても解決しなかったあの問題、ここで一緒に解決します。"

  [[params.socialIcons]]
    name = "x"
    url = "https://x.com/1mm_mowakaranai"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    codeFences = true
    lineNos = false
    style = "monokai"

[menu]
  [[menu.main]]
    identifier = "tags"
    name = "タグ"
    url = "/tags/"
    weight = 10
  [[menu.main]]
    identifier = "archives"
    name = "アーカイブ"
    url = "/archives/"
    weight = 20
  [[menu.main]]
    identifier = "search"
    name = "検索"
    url = "/search/"
    weight = 30
  [[menu.main]]
    identifier = "privacy"
    name = "プライバシーポリシー"
    url = "/privacy/"
    weight = 40
  [[menu.main]]
    identifier = "contact"
    name = "お問い合わせ"
    url = "/contact/"
    weight = 50
  [[menu.main]]
    identifier = "about"
    name = "プロフィール"
    url = "/about/"
    weight = 35
